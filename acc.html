<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* کانتینر اصلی کاملاً شفاف */
        .acc-container {
            width: 100%;
            background: transparent;
            border: none;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* هدر آکاردئون */
        .acc-header {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            padding: 10px 0;
            user-select: none;
        }

        /* بخش آیکون و تنظیم چرخش */
        .acc-icon {
            display: flex;
            align-items: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* وقتی آکاردئون باز است (حالت پیش‌فرض فعلی) */
        .acc-container.active .acc-icon {
            transform: rotate(180deg);
        }

        /* محتوای آکاردئون با انیمیشن همزمان */
        .acc-content {
            display: grid;
            grid-template-rows: 0fr; /* تکنیک گرید برای انیمیشن ارتفاع Auto */
            transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* باز شدن محتوا همزمان با چرخش آیکون */
        .acc-container.active .acc-content {
            grid-template-rows: 1fr;
        }

        .acc-inner {
            overflow: hidden;
        }

        .acc-body {
            padding-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="acc-container active" id="accItem">
        <div class="acc-header" onclick="toggleAcc()">
            <div class="acc-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
            <span style="margin-right: 12px; font-weight: bold;">عنوان بخش (پیش‌فرض باز)</span>
        </div>

        <div class="acc-content">
            <div class="acc-inner">
                <div class="acc-body">
                    این محتوا به صورت پیش‌فرض نمایش داده می‌شود. با کلیک روی ایکون، همزمان با چرخش فلش، این بخش نیز با انیمیشنی نرم جمع می‌شود. از تکنیک CSS Grid برای روان‌تر شدن حرکت استفاده شده است.
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleAcc() {
            document.getElementById('accItem').classList.toggle('active');
        }
    </script>

</body>
</html>
